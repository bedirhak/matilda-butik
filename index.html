<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matilda Butik - Dijital Varlıklar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1080px;
            padding: 40px 20px 60px;
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-section img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border-radius: 24px;
        }

        .logo-section h1 {
            margin-top: 12px;
            font-size: 22px;
            font-weight: 600;
            color: #e8b4d0;
            letter-spacing: 1px;
        }

        /* Section titles */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        /* Icon Grid */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .icon-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            aspect-ratio: 1;
        }

        .icon-card:hover {
            background: #222;
            border-color: #444;
            transform: translateY(-2px);
        }

        .icon-card:active {
            transform: scale(0.96);
        }

        .icon-card .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .icon-card .label {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: #ccc;
        }

        .icon-card .sub-label {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-align: center;
            word-break: break-all;
        }

        /* Bank Colors */
        .bank-akbank .icon { background: #e4002b; }
        .bank-ziraat .icon { background: #00854a; }
        .bank-vakif .icon { background: #ffc300; color: #1a1a1a; }
        .bank-garanti .icon { background: #00a651; }
        .bank-is .icon { background: #6b3fa0; }
        .bank-yapikredi .icon { background: #004990; }

        /* Action buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .action-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #fff;
            aspect-ratio: 1;
        }

        .action-card:hover {
            background: #222;
            border-color: #444;
            transform: translateY(-2px);
        }

        .action-card:active {
            transform: scale(0.96);
        }

        .action-card .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .action-card .label {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: #ccc;
        }

        .whatsapp .icon { background: #25d366; }
        .search-btn .icon { background: #555; }
        .instagram .icon {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .phone-btn .icon { background: #3b82f6; }
        .contact-save .icon { background: #f59e0b; }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #25d366;
            color: #000;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* IBAN modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 32px;
            max-width: 440px;
            width: 90%;
            text-align: center;
        }

        .modal h3 {
            font-size: 18px;
            margin-bottom: 6px;
            color: #fff;
        }

        .modal .modal-subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .modal .iban-display {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 1px;
            color: #e8b4d0;
            margin-bottom: 20px;
            word-break: break-all;
            user-select: all;
        }

        .modal .copy-btn {
            background: #e8b4d0;
            color: #0d0d0d;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .modal .copy-btn:hover {
            background: #d4a0bc;
        }

        .modal .close-btn {
            margin-top: 12px;
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
        }

        .modal .close-btn:hover {
            color: #aaa;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1a1a1a;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px 40px;
            }

            .icon-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .action-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .logo-section img {
                width: 120px;
                height: 120px;
            }

            .icon-card .icon,
            .action-card .icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }

        /* SVG icons */
        .icon svg {
            width: 26px;
            height: 26px;
            fill: #fff;
        }

        .bank-vakif .icon svg {
            fill: #1a1a1a;
        }
    </style>

<!-- IBAN Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
        <h3 id="modalBank"></h3>
        <div class="modal-subtitle" id="modalName"></div>
        <div class="iban-display" id="modalIban"></div>
        <button class="copy-btn" onclick="copyIban()">📋 IBAN Kopyala</button>
        <br>
        <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('active')">Kapat</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✓ IBAN kopyalandı!</div>

<script>
    let currentIban = '';

    function showIban(bank, name, iban) {
        currentIban = iban;
        document.getElementById('modalBank').textContent = bank;
        document.getElementById('modalName').textContent = name;
        document.getElementById('modalIban').textContent = iban;
        document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(e) {
        if (e.target === e.currentTarget) {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    }

    function copyIban() {
        const cleanIban = currentIban.replace(/\s/g, '');
        navigator.clipboard.writeText(cleanIban).then(() => {
            showToast('✓ IBAN kopyalandı!');
            setTimeout(() => {
                document.getElementById('modalOverlay').classList.remove('active');
            }, 600);
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = cleanIban;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✓ IBAN kopyalandı!');
            setTimeout(() => {
                document.getElementById('modalOverlay').classList.remove('active');
            }, 600);
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function saveContact() {
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'FN:Matilda Butik',
            'TEL;TYPE=CELL:+905322644940',
            'URL:https://www.instagram.com/matildabutikk/',
            'END:VCARD'
        ].join('\n');
        const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Matilda_Butik.vcf';
        a.click();
        URL.revokeObjectURL(url);
        showToast('\u2713 Rehber kartı indiriliyor...');
    }

    function toggleSearch() {
        const bar = document.getElementById('searchBar');
        const input = document.getElementById('searchInput');
        if (bar.style.display === 'none') {
            bar.style.display = 'block';
            input.focus();
        } else {
            bar.style.display = 'none';
            input.value = '';
            filterBanks();
        }
    }

    function filterBanks() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('#bankGrid .icon-card');
        cards.forEach(card => {
            const bank = card.getAttribute('data-bank').toLowerCase();
            card.style.display = bank.includes(query) ? '' : 'none';
        });
    }

    // Close modal on Escape
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    });
</script>
